<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debug - Notificações Push</title>
  
  <meta name="theme-color" content="#2e7d32">
  <link rel="manifest" href="./site.webmanifest">
  
  <link rel="stylesheet" href="css/debug.css">
</head>
<body>
  <div class="container">
    <h1>🔔 Debug - Notificações Push</h1>
    
    <div class="card">
      <h2>📱 Informações do Dispositivo</h2>
      <div class="info-row">
        <span class="info-label">User Agent:</span>
        <span class="info-value" id="user-agent"></span>
      </div>
      <div class="info-row">
        <span class="info-label">Plataforma:</span>
        <span class="info-value" id="platform"></span>
      </div>
      <div class="info-row">
        <span class="info-label">É Android:</span>
        <span class="info-value" id="is-android"></span>
      </div>
      <div class="info-row">
        <span class="info-label">É iOS:</span>
        <span class="info-value" id="is-ios"></span>
      </div>
      <div class="info-row">
        <span class="info-label">É PWA:</span>
        <span class="info-value" id="is-pwa"></span>
      </div>
    </div>
    
    <div class="card">
      <h2>🔧 Suporte a APIs</h2>
      <div class="info-row">
        <span class="info-label">Notification API:</span>
        <span class="info-value" id="has-notification"></span>
      </div>
      <div class="info-row">
        <span class="info-label">Service Worker:</span>
        <span class="info-value" id="has-sw"></span>
      </div>
      <div class="info-row">
        <span class="info-label">Push Manager:</span>
        <span class="info-value" id="has-push"></span>
      </div>
      <div class="info-row">
        <span class="info-label">Permissão Atual:</span>
        <span class="info-value" id="permission"></span>
      </div>
    </div>
    
    <div class="card">
      <h2>🎯 Ações</h2>
      <button id="btn-request-permission">Solicitar Permissão</button>
      <button id="btn-subscribe">Criar Subscription</button>
      <button id="btn-check-subscription">Verificar Subscription</button>
      <button id="btn-test-notification">Testar Notificação Local</button>
      <button id="btn-clear-logs">Limpar Logs</button>
    </div>
    
    <div class="card">
      <h2>📋 Logs</h2>
      <div id="logs"></div>
    </div>
  </div>

  <script type="module" src="js/debug.js"></script>
</body>
</html>
