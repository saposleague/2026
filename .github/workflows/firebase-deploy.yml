name: Deploy Firebase Functions

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - 'firestore.rules'
      - '.github/workflows/firebase-deploy.yml'

jobs:
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Instalar dependências
        run: npm ci
        working-directory: functions

      # Cria o functions/.env a partir dos GitHub Secrets
      # A chave privada VAPID nunca fica no repositório
      - name: Criar functions/.env
        run: |
          cat > functions/.env << 'EOF'
          VAPID_PUBLIC_KEY=BOD3066MNR-gYBI6qquZcm2RxlN_ia_dQtADtGZGhan7SeuxcN6T8WwWB0sEnMpWpQ0aS0OkwoItlgYza1MkiRg
          VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_MAILTO=mailto:contato@saposleague.com
          EOF

      - name: Deploy para Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npm install -g firebase-tools
          firebase deploy --only functions,firestore:rules --token "$FIREBASE_TOKEN" --non-interactive --force
      
      - name: Notificar sucesso
        if: success()
        run: echo "✅ Deploy realizado com sucesso!"
      
      - name: Notificar falha
        if: failure()
        run: echo "❌ Deploy falhou. Verifique os logs acima."
