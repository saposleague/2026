<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAPOS LEAGUE - Jogadores</title>
  <meta name="description" content="Gerenciar jogadores - Sapos League">
  <meta name="theme-color" content="#0a1628">
  <link rel="icon" href="./images/web-app-manifest-512x512.png?v=5" type="image/png" sizes="512x512" />
  <link rel="icon" href="./images/web-app-manifest-192x192.png?v=5" type="image/png" sizes="192x192" />
  <link rel="shortcut icon" href="./images/web-app-manifest-512x512.png?v=5" />
  <link rel="apple-touch-icon" href="./images/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest">
  <link rel="stylesheet" href="css/gerador-times.css">
  <link rel="stylesheet" href="css/jogadores.css">
</head>
<body>

  <div class="sp-bg-field"></div>
  <svg class="sp-lines" viewBox="0 0 420 220" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="10" y="10" width="400" height="200" rx="8" stroke="white" stroke-width="1.5"/>
    <line x1="210" y1="10" x2="210" y2="210" stroke="white" stroke-width="1.5"/>
    <circle cx="210" cy="110" r="50" stroke="white" stroke-width="1.5"/>
    <rect x="10" y="60" width="60" height="100" rx="4" stroke="white" stroke-width="1.5"/>
    <rect x="350" y="60" width="60" height="100" rx="4" stroke="white" stroke-width="1.5"/>
  </svg>

  <!-- Header -->
  <div class="sp-header">
    <button id="voltar-button" class="sp-back" aria-label="Voltar ao Painel">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
      Voltar ao Painel
    </button>
    <div class="sp-logo">
      <div class="sp-logo-icon">⚽</div>
      <div class="sp-logo-text">SAPOS <span>LEAGUE</span></div>
    </div>
    <button id="logout-button" class="sp-logout-btn">Sair</button>
  </div>

  <!-- Hero -->
  <div class="sp-hero">
    <div class="sp-page-badge">👤 Jogadores</div>
    <h1 class="sp-title">GERENCIAR <span>JOGADORES</span></h1>
    <p class="sp-subtitle">Adicione, edite ou remova jogadores da pelada</p>
  </div>

  <div class="sp-content">

    <!-- Card: Adicionar -->
    <div class="sp-card">
      <div class="sp-card-header">
        <div class="sp-card-title">
          <div class="sp-card-title-icon">➕</div>
          Adicionar Jogador
        </div>
      </div>
      <div class="sp-config-body">
        <div class="sp-form-field">
          <div class="sp-form-label">Nome</div>
          <input type="text" id="input-nome" class="sp-input" placeholder="Nome do jogador" maxlength="60" />
        </div>
        <div class="sp-form-field">
          <div class="sp-form-label">Nível</div>
          <div class="sp-star-row" id="star-add">
            <span class="sp-star" data-v="1">★</span>
            <span class="sp-star" data-v="2">★</span>
            <span class="sp-star" data-v="3">★</span>
            <span class="sp-star" data-v="4">★</span>
            <span class="sp-star" data-v="5">★</span>
          </div>
        </div>
        <div class="sp-gerar-row">
          <button id="btn-adicionar" class="sp-btn-gerar" disabled>➕ Adicionar Jogador</button>
        </div>
        <div id="msg-add" class="sp-alert" style="display:none;"></div>
      </div>
    </div>

    <!-- Card: Lista -->
    <div class="sp-card">
      <div class="sp-card-header">
        <div class="sp-card-title">
          <div class="sp-card-title-icon" style="background:rgba(96,165,250,0.15);">📋</div>
          Lista de Jogadores
          <span id="total-count" class="sp-count"></span>
        </div>
      </div>
      <div class="sp-search">
        <span class="sp-search-icon">🔍</span>
        <input type="text" id="busca-input" placeholder="Buscar jogador..." />
      </div>
      <div id="lista-jogadores" class="jog-list">
        <p class="sp-empty">Carregando...</p>
      </div>
    </div>

  </div>

  <!-- Modal: Editar -->
  <div id="modal-editar" class="sp-modal-overlay">
    <div class="sp-modal">
      <div class="sp-modal-header">✏️ Editar Jogador</div>
      <div class="sp-modal-body" style="display:flex;flex-direction:column;gap:14px;">
        <input type="hidden" id="edit-id" />
        <div class="sp-form-field">
          <div class="sp-form-label">Nome</div>
          <input type="text" id="edit-nome" class="sp-input" maxlength="60" />
        </div>
        <div class="sp-form-field">
          <div class="sp-form-label">Nível</div>
          <div class="sp-star-row" id="star-edit">
            <span class="sp-star" data-v="1">★</span>
            <span class="sp-star" data-v="2">★</span>
            <span class="sp-star" data-v="3">★</span>
            <span class="sp-star" data-v="4">★</span>
            <span class="sp-star" data-v="5">★</span>
          </div>
        </div>
        <div id="msg-edit" class="sp-alert" style="display:none;"></div>
        <div class="sp-btn-row" style="justify-content:center;">
          <button id="btn-salvar" class="sp-btn sp-btn-primary">💾 Salvar</button>
          <button id="btn-cancelar-edit" class="sp-btn sp-btn-ghost">Cancelar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: Confirmar exclusão -->
  <div id="modal-excluir" class="sp-modal-overlay">
    <div class="sp-modal">
      <div class="sp-modal-header">🗑️ Remover Jogador</div>
      <div class="sp-modal-body">
        <p id="excluir-texto" style="margin-bottom:20px;"></p>
        <div class="sp-btn-row" style="justify-content:center;">
          <button id="btn-confirmar-excluir" class="sp-btn sp-btn-danger">Remover</button>
          <button id="btn-cancelar-excluir" class="sp-btn sp-btn-ghost">Cancelar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/dynamic-favicon.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script type="module" src="js/jogadores.js"></script>
</body>
</html>
