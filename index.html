<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAPOS LEAGUE</title>
  
  <!-- PWA Meta Tags -->
  <meta name="description" content="Sistema de gerenciamento do campeonato Sapos League 2026 com notificações em tempo real e suporte offline">
  <meta name="theme-color" content="#2e7d32">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sapos League">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Sapos League">
  <meta name="msapplication-TileColor" content="#2e7d32">
  <meta name="msapplication-config" content="./browserconfig.xml">
  
  <!-- iOS Specific Meta Tags -->
  <meta name="apple-touch-fullscreen" content="yes">
  <meta name="format-detection" content="telephone=no">
  <meta name="apple-mobile-web-app-orientation" content="portrait">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://saposleague.com/">
  <meta property="og:title" content="Sapos League 2026">
  <meta property="og:description" content="Sistema completo de gerenciamento do campeonato com notificações em tempo real">
  <meta property="og:image" content="./images/web-app-manifest-512x512.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://saposleague.com/">
  <meta property="twitter:title" content="Sapos League 2026">
  <meta property="twitter:description" content="Sistema completo de gerenciamento do campeonato com notificações em tempo real">
  <meta property="twitter:image" content="./images/web-app-manifest-512x512.png">
  
  <!-- Favicon otimizado - Tamanhos maiores para melhor qualidade -->
  <link rel="icon" href="./images/web-app-manifest-512x512.png?v=5" type="image/png" sizes="512x512" />
  <link rel="icon" href="./images/web-app-manifest-192x192.png?v=5" type="image/png" sizes="192x192" />
  <link rel="icon" href="./images/favicon-96x96.png?v=5" type="image/png" sizes="96x96" />
  <link rel="shortcut icon" href="./images/web-app-manifest-512x512.png?v=5" />
  
  <!-- Apple Touch Icons - Multiple sizes for better iOS support -->
  <link rel="apple-touch-icon" href="./images/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="57x57" href="./images/favicon-48x48.png" />
  <link rel="apple-touch-icon" sizes="60x60" href="./images/favicon-48x48.png" />
  <link rel="apple-touch-icon" sizes="72x72" href="./images/favicon-96x96.png" />
  <link rel="apple-touch-icon" sizes="76x76" href="./images/favicon-96x96.png" />
  <link rel="apple-touch-icon" sizes="114x114" href="./images/favicon-96x96.png" />
  <link rel="apple-touch-icon" sizes="120x120" href="./images/favicon-96x96.png" />
  <link rel="apple-touch-icon" sizes="144x144" href="./images/web-app-manifest-192x192.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="./images/web-app-manifest-192x192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./images/apple-touch-icon.png" />
  
  <!-- Splash screens iOS removidos - usando splash customizado apenas -->
  
  <!-- Manifest -->
  <link rel="manifest" href="./site.webmanifest">
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/dark-mode-colors.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/index-splash.css">
</head>
<body>
  <!-- Splash Screen PWA Customizado (inicialmente oculto) -->
  <div id="pwa-splash-screen" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: #667eea;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition: opacity 0.5s ease, transform 0.5s ease;
    font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  ">
    <!-- Logo centralizado (ícone real do Sapos League) -->
    <img src="./images/web-app-manifest-512x512.png" style="
      width: min(35vw, 35vh);
      height: min(35vw, 35vh);
      max-width: 200px;
      max-height: 200px;
      min-width: 120px;
      min-height: 120px;
      border-radius: 20%;
      margin-bottom: auto;
      margin-top: auto;
      object-fit: contain;
    " alt="Sapos League" />
    
    <!-- Texto na parte inferior (mesma posição do iOS) -->
    <div style="
      position: absolute;
      bottom: 12vh;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.9);
      font-size: min(4.5vw, 4.5vh);
      font-weight: 300;
      text-align: center;
      white-space: nowrap;
    ">Sapos League 2026</div>
  </div>

  <!-- Conteúdo Principal (inicialmente oculto) -->
  <div id="main-app-content" class="main-content-hidden">
  
  <!-- Botão de modo noturno -->
  <button id="toggle-dark-mode" aria-label="Alternar modo noturno" class="dark-toggle-button">
</button>
  
  <!-- Header fixo -->
  <header>SAPOS LEAGUE</header>
  
  <!-- Navegação de Fases (abaixo do header) -->
  <div class="fase-navigation">
    <button id="btn-fase-anterior" class="seta-fase" onclick="window.faseAnterior()" aria-label="Fase anterior">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h2 id="titulo-fase" class="titulo-fase">PRIMEIRA FASE</h2>
    <button id="btn-fase-proxima" class="seta-fase" onclick="window.proximaFase()" aria-label="Próxima fase">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <div class="container">
    <div class="tabela">
      <h2>Sapos League 2026</h2>
      <table id="tabela">
        <thead>
          <tr>
            <th>#</th><th>Time</th><th>PTS</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GC</th><th>SG</th><th>%</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="jogos">
      <div class="rodada-header">
        <button class="seta" onclick="window.anteriorRodada()" aria-label="Rodada anterior">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <h3 id="rodada-titulo">Rodada</h3>
        <button class="seta" onclick="window.proximaRodada()" aria-label="Próxima rodada">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <div id="lista-jogos"></div>
    </div>
  </div>

  <div class="botao-peladas-container">
    <button class="botao-peladas" onclick="window.location.href='pelada/'">
      Ver Peladas
    </button>
  </div>
  
  </div> <!-- Fim do main-app-content -->

  <script src="js/pwa-splash.js"></script>
  <script src="js/dynamic-favicon.js"></script>
  <script src="js/dark-mode-logic.js"></script>
  <script type="module" src="js/index.js"></script>
  <script type="module" src="js/pwa-complete.js"></script>
  <script type="module" src="js/web-push-ios.js"></script>
  <script src="js/pwa-install.js"></script>
</body>
</html>
